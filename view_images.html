<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: sans-serif; margin: 0; padding: 10px; }
  .grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .img-container { width: 140px; text-align: center; border: 1px solid #eee; padding: 5px; box-sizing: border-box; }
  img { height: 100px; width: 100px; object-fit: contain; }
  h3 { font-size: 11px; margin: 0 0 5px 0; color: #333; }
</style>
</head>
<body>
  <div class="grid">
  <script>
    const files = [
      "WhatsApp Image 2026-03-02 at 3.28.59 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.00 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.01 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.01 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.02 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.03 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.04 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.04 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.05 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.05 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.06 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.06 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.07 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.07 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.08 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.08 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.09 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.09 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.10 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.10 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.11 PM (1).jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.11 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.12 PM.jpeg",
      "WhatsApp Image 2026-03-02 at 3.29.13 PM.jpeg",
      "WhatsApp Image 2026-03-03 at 8.40.07 PM (1).jpeg",
      "WhatsApp Image 2026-03-03 at 8.40.07 PM (2).jpeg",
      "WhatsApp Image 2026-03-03 at 8.40.07 PM.jpeg",
      "WhatsApp Image 2026-03-03 at 8.40.08 PM (1).jpeg",
      "WhatsApp Image 2026-03-03 at 8.40.08 PM (2).jpeg",
      "WhatsApp Image 2026-03-03 at 8.40.08 PM.jpeg",
      "WhatsApp Image 2026-03-03 at 8.40.09 PM.jpeg"
    ];
    files.forEach((f, i) => {
      document.write('<div class="img-container">');
      document.write('<h3>' + i + '</h3>');
      document.write('<img src="assets/images/products/' + encodeURIComponent(f) + '" />');
      document.write('</div>');
    });
  </script>
  </div>
</body>
</html>
